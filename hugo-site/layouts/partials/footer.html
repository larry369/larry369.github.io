<footer class="footer">
    <div class="footer-inner">
        <p>&copy; {{ now.Year }} {{ .Site.Params.author }}. All rights reserved.</p>
        <div class="footer-links">
            {{ with .Site.Params.social.github }}<a href="{{ . }}" target="_blank">GitHub</a>{{ end }}
            {{ with .Site.Params.social.email }}<a href="mailto:{{ . }}">Email</a>{{ end }}
        </div>
    </div>
</footer>
